<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>D-FLIX</title>
<style>
  /* Global Selection Disabled for Native App Feel */
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none; 
    -moz-user-select: none;    
    -ms-user-select: none;     
    user-select: none;         
  }

  :root {
    --blue: #00e5ff; 
    --blue-glow: rgba(0, 229, 255, 0.4);
    --dark: #050508; 
    --card-bg: rgba(15, 15, 25, 0.4);
    --text: #ffffff;
    --muted: #8e8e93;
    --glass-border: rgba(255, 255, 255, 0.06);
  }

  html, body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body { max-width: 430px; margin: 0 auto; padding-bottom: 90px; position: relative; }
  
  #app { 
    position: relative; 
    z-index: 2; 
    background: transparent; 
    padding-top: 75px; 
  }
  
  .search-overlay { position: relative; z-index: 500; background: transparent; }

  @media (orientation: landscape) {
    body { max-width: 100%; }
  }

  button, input { font-family: inherit; }
  
  input {
    -webkit-user-select: text;
    -moz-user-select: text;
    -ms-user-select: text;
    user-select: text;
  }

/* ========================================= */
/* ===== TV REMOTE FOCUS CONTROLS (STABLE) ==== */
/* ========================================= */

:focus { outline: none !important; }

/* Header Search Icon Focus & Persistent Glow */
.icon-btn:focus, .icon-btn.focused {
  background: rgba(0, 229, 255, 0.15) !important;
  box-shadow: 0 0 0 2px var(--blue), 0 0 15px var(--blue-glow) !important;
  transform: scale(1.1);
  border-radius: 50%;
}

/* Bottom Nav Focus - whichever item the TV remote cursor is on gets
   highlighted with a glow (".active" marks the tab the user is
   currently on, ".focused" marks the item where the remote's cursor is -
   both can be true at once, so the colors are kept a bit different) */
.nav-item:focus, .nav-item.focused {
  outline: none !important;
  color: #fff !important;
  background: rgba(0, 229, 255, 0.12);
  box-shadow: 0 0 0 2px var(--blue), 0 0 12px var(--blue-glow);
  border-radius: 10px;
  transform: scale(1.08);
}

/* Movie/Folder Card Persistent Highlight */
.grid-card:focus, .grid-card.focused {
  transform: translateY(-5px) scale(1.05) !important;
  border-color: var(--blue) !important;
  box-shadow: 0 0 0 3px var(--blue), 0 10px 25px rgba(0, 229, 255, 0.5) !important;
  z-index: 10;
}

/* Search Box Focus */
.search-box:focus-within, .search-box.focused {
  border-color: var(--blue) !important;
  box-shadow: 0 0 0 2px var(--blue), 0 0 15px rgba(0, 229, 255, 0.3) !important;
  background: rgba(10, 10, 15, 0.9);
}

  /* ========================================= */
  /* ===== FIXED HEADER ===== */
  .header {
    position: fixed; 
    top: 0; left: 0; right: 0;
    max-width: 430px; 
    margin: 0 auto;
    z-index: 100;
    background: #06060a; 
    border-bottom: 1px solid var(--glass-border);
    padding: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  
  @media (orientation: landscape) {
    .header { max-width: 100%; }
  }

  .logo { 
    font-size: 22px; 
    font-weight: 800; 
    letter-spacing: 1.5px; 
    display: flex; 
    align-items: center; 
    gap: 6px;
    text-transform: uppercase;
  }
  .logo span { color: var(--blue); font-weight: 900; text-shadow: 0 0 10px var(--blue-glow); }
  .header-icons { display: flex; gap: 14px; align-items: center; }
  .icon-btn {
    background: none; border: none; color: #fff; cursor: pointer;
    padding: 8px; border-radius: 50%; display: flex;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .icon-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
  .icon-btn svg { width: 22px; height: 22px; }
  
  /* ===== BREADCRUMB PATH ===== */
  .breadcrumb {
    padding: 12px 16px;
    font-size: 13px; color: var(--blue);
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    font-weight: 500;
  }
  .breadcrumb span.crumb { cursor: pointer; transition: color 0.2s; }
  .breadcrumb span.crumb:hover { color: #fff; }
  .breadcrumb .sep { color: var(--muted); }
  .breadcrumb .current { color: #fff; }

  /* ===== GRID VIEW ===== */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    padding: 8px 16px 20px;
  }

  @media (orientation: landscape) {
    .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  }
  
  .grid-card {
    border-radius: 12px; overflow: hidden;
    cursor: pointer; position: relative;
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .grid-card:hover { 
    transform: translateY(-6px) scale(1.03); 
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8); 
    border-color: rgba(255, 255, 255, 0.2); 
  }
  .grid-card:active { transform: scale(0.97); }
  
  .grid-card .thumb {
    width: 100%; aspect-ratio: 2/3;
    object-fit: cover; display: block;
    background: #111;
  }
  
  .grid-card .no-poster {
    width: 100%; aspect-ratio: 2/3;
    background: linear-gradient(145deg, #121620, #050508);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
  }
  .grid-card.folder-card .no-poster {
    background: linear-gradient(145deg, #091322, #020205);
  }
  .grid-card .gi { font-size: 28px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)); color: #fff; opacity: 0.9; }
  
  .grid-card .grid-name {
    font-size: 12px; color: #eee;
    padding: 12px 8px 8px;
    text-align: center;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
    background: linear-gradient(to top, rgba(0,0,0,1) 30%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0) 100%);
    position: absolute; bottom: 0; width: 100%;
    font-weight: 500;
  }
  
  .grid-card .badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0, 229, 255, 0.9); color: #000;
    font-size: 10px; font-weight: 700;
    padding: 3px 6px; border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .grid-card .badge.saved { background: rgba(46, 213, 115, 0.92); }
  .grid-card .grid-remove-btn {
    position: absolute; top: 8px; right: 8px;
    width: 26px; height: 26px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: none; color: #ff8080;
    display: flex; align-items: center; justify-content: center;
    z-index: 2; backdrop-filter: blur(4px);
  }
  .grid-card .grid-remove-btn svg { width: 14px; height: 14px; }

  /* ===== STATE SCREENS ===== */
  .state-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 60px 30px; gap: 16px; min-height: 60vh;
  }
  .state-screen .emoji { font-size: 48px; opacity: 0.8; }
  .state-screen .msg { color: var(--muted); font-size: 14px; line-height: 1.6; max-width: 80%; }
  .state-screen .title { font-size: 18px; font-weight: 600; color: #fff; }

  .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(0, 229, 255, 0.1); border-top-color: var(--blue);
    animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== FIXED BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-width: 430px; margin: 0 auto;
    background: #06060a;
    border-top: 1px solid var(--glass-border);
    display: flex; justify-content: space-around;
    padding: 10px 0 calc(12px + env(safe-area-inset-bottom));
    z-index: 200;
  }

  @media (orientation: landscape) { .bottom-nav { max-width: 100%; } }
  
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; background: none; border: none;
    color: var(--muted); font-size: 10px; font-weight: 500;
    white-space: nowrap;
    transition: all 0.2s ease;
  }
  .nav-item.active { color: #fff; }
  .nav-item.active svg { color: var(--blue); filter: drop-shadow(0 0 5px rgba(0,229,255,0.5)); }
  .nav-item svg { width: 22px; height: 22px; transition: all 0.2s; }

  /* ===== BACK BUTTON (shown inside the header in browse-mode) ===== */
  .back-btn { display: none; }
  #app.browse-mode .back-btn { display: flex; }
  #app.browse-mode .logo { display: none; }

  /* ===== HOME: HERO BANNER ===== */
  .hero {
    position: relative; min-height: 260px;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 20px 16px 24px; margin-bottom: 8px;
    background-color: #0a0a10;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center center;
    background-color: #0a0a10;
    opacity: 0;
    transition: opacity 0.9s ease-in-out;
    z-index: 0;
  }
  .hero-bg.active { opacity: 1; }
  .hero::before {
    content: ""; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to top, var(--dark) 5%, rgba(5,5,8,0.55) 55%, rgba(5,5,8,0.15) 100%);
  }
  .hero-tag, .hero-actions, .hero-dots { position: relative; z-index: 2; }
  .hero-tag {
    font-size: 12px; font-weight: 700; letter-spacing: 2px;
    color: var(--blue); text-transform: uppercase; margin-bottom: 14px;
    text-shadow: 0 0 12px var(--blue-glow);
    transition: opacity 0.25s ease;
  }
  .hero-actions { display: flex; gap: 12px; }
  .hero-dots { display: flex; gap: 6px; margin-top: 16px; }
  .hero-dots .dot {
    width: 6px; height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.35);
    transition: all 0.3s ease;
  }
  .hero-dots .dot.active { background: #fff; width: 18px; }
  .btn-play, .btn-secondary {
    display: flex; align-items: center; gap: 8px;
    border: none; border-radius: 8px; padding: 13px 22px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: transform 0.15s ease;
  }
  .btn-play { background: #fff; color: #000; }
  .btn-secondary { background: rgba(255,255,255,0.12); color: #fff; backdrop-filter: blur(6px); }
  .btn-play:active, .btn-secondary:active { transform: scale(0.96); }
  .btn-play svg, .btn-secondary svg { width: 18px; height: 18px; }

  /* ===== HOME: ROWS ===== */
  .row-section { margin-bottom: 22px; }
  .row-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 10px;
  }
  .row-title { font-size: 18px; font-weight: 700; color: #fff; }
  .row-seeall { font-size: 13px; font-weight: 600; color: var(--blue); background: none; border: none; }

  .movie-row {
    display: flex; gap: 12px; overflow-x: auto; padding: 4px 16px 8px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
  }
  .movie-row::-webkit-scrollbar { display: none; }
  .movie-row .grid-card {
    flex: 0 0 108px; width: 108px; scroll-snap-align: start;
  }

  .row-loading {
    display: flex; gap: 12px; padding: 4px 16px 8px;
  }
  .row-loading .skeleton-card {
    flex: 0 0 108px; width: 108px; aspect-ratio: 2/3; border-radius: 12px;
    background: linear-gradient(90deg, #101018 25%, #17171f 37%, #101018 63%);
    background-size: 400% 100%; animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

  /* ===== ACTION SHEET (Play/View + Download popup) ===== */
  .action-sheet-overlay {
    position: fixed; inset: 0; z-index: 600; display: none;
    align-items: flex-end; justify-content: center;
    max-width: 430px; margin: 0 auto;
    background: rgba(0,0,0,0.6);
  }
  .action-sheet-overlay.active { display: flex; }
  @media (orientation: landscape) { .action-sheet-overlay { max-width: 100%; } }

  .action-sheet {
    width: 100%; background: #0c0c12; border-top: 1px solid var(--glass-border);
    border-radius: 20px 20px 0 0; padding: 8px 0 calc(16px + env(safe-area-inset-bottom));
    max-height: 70vh; overflow-y: auto;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
  }
  .action-sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px; border-bottom: 1px solid var(--glass-border);
  }
  .action-sheet-title { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.4; padding-right: 12px; }
  .action-sheet-body { padding: 8px 0; }
  .action-option {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
  }
  .action-option:last-child { border-bottom: none; }
  .action-option:active { background: rgba(0,229,255,0.06); }
  .action-option .a-icon {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,229,255,0.1); color: var(--blue);
  }
  .action-option .a-icon svg { width: 20px; height: 20px; }
  .action-option .a-label { font-size: 15px; font-weight: 600; color: #fff; }
  .action-option .a-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ===== CONFIRM DIALOG (delete confirmation) ===== */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 700; display: none;
    align-items: center; justify-content: center;
    max-width: 430px; margin: 0 auto;
    background: rgba(0,0,0,0.65);
  }
  .confirm-overlay.active { display: flex; }
  @media (orientation: landscape) { .confirm-overlay { max-width: 100%; } }

  .confirm-box {
    width: 85%; max-width: 320px; background: #14141c;
    border: 1px solid var(--glass-border); border-radius: 16px;
    padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  .confirm-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .confirm-msg { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-btn {
    flex: 1; padding: 11px; border-radius: 10px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .confirm-btn.cancel { background: rgba(255,255,255,0.08); color: #fff; }
  .confirm-btn.danger { background: #ff4d4d; color: #fff; }

  /* ===== DOWNLOADS VIEW ===== */
  .downloads-list { padding: 8px 16px 20px; }
  .download-folder-group {
    background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
    border-radius: 14px; margin-bottom: 14px; overflow: hidden;
  }
  .download-folder-header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; background: rgba(0,229,255,0.05);
    border-bottom: 1px solid var(--glass-border);
  }
  .download-folder-header .d-icon {
    width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: linear-gradient(145deg, #121620, #050508);
  }
  .download-folder-header .d-btn {
    background: rgba(255,255,255,0.08); border: none; color: #ff5c5c;
    border-radius: 8px; padding: 8px; display: flex; cursor: pointer; flex-shrink: 0;
  }
  .download-folder-header .d-btn svg { width: 16px; height: 16px; }
  .download-folder-items { padding: 8px 10px 4px; }
  .download-folder-items .download-row { margin: 0 0 8px; }
  .download-folder-items .download-row:last-child { margin-bottom: 4px; }
  .download-folder-group .download-complete-grid { padding: 12px 10px 14px; }
  .download-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--card-bg); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
  }
  .download-row .d-icon {
    width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: linear-gradient(145deg, #121620, #050508);
  }
  .download-row .d-info { flex: 1; min-width: 0; }
  .download-row .d-name {
    font-size: 14px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .download-row .d-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .download-row .d-progress-track {
    margin-top: 8px; height: 4px; border-radius: 4px; overflow: hidden;
    background: rgba(255,255,255,0.08); width: 100%;
  }
  .download-row .d-progress-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--blue), #6fe8ff);
    transition: width 0.25s ease;
  }
  .download-row .d-actions { display: flex; gap: 8px; }
  .download-row .d-btn {
    background: rgba(255,255,255,0.08); border: none; color: #fff;
    border-radius: 8px; padding: 8px; display: flex; cursor: pointer;
  }
  .download-row .d-btn svg { width: 16px; height: 16px; }
  .download-row .d-btn.remove { color: #ff5c5c; }

  /* ===== SEARCH OVERLAY ===== */
  .search-overlay {
    position: fixed; inset: 0; background: #050508;
    max-width: 430px; margin: 0 auto;
    z-index: 500; display: none; flex-direction: column;
    animation: fadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes fadeIn { from { opacity: 0; transform: scale(1.01); } to { opacity: 1; transform: scale(1); } }

  @media (orientation: landscape) { .search-overlay { max-width: 100%; } }
  .search-overlay.active { display: flex; }
  
  .search-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; border-bottom: 1px solid var(--glass-border);
  }
  
  .search-box {
    flex: 1; display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px; padding: 10px 14px;
    transition: all 0.2s;
  }
  .search-box svg { width: 18px; height: 18px; color: var(--muted); flex-shrink: 0; }
  .search-box:focus-within svg { color: var(--blue); }
  .search-box input {
    flex: 1; background: none; border: none; outline: none;
    color: #fff; font-size: 15px;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box .clear-btn { background: none; border: none; color: #fff; cursor: pointer; display: none; }
  .search-result-label { padding: 16px 16px 8px; font-size: 13px; font-weight: 600; color: var(--muted); }
  .search-body { flex: 1; overflow-y: auto; }

  .hidden { display: none !important; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(20px);
    background: rgba(15,15,22,0.95); color: #fff; font-size: 13px; font-weight: 500;
    padding: 12px 24px; border-radius: 30px; z-index: 999;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    max-width: 85%; text-align: center; opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
  /* ======================================================= */
  /* ===== 100% LAG-FREE OPTIMIZED CINEMATIC BACKGROUND ==== */
  /* ======================================================= */
  .premium-bg {
    position: fixed; inset: 0; background: var(--dark); overflow: hidden; pointer-events: none; z-index: 0;
  }

  .premium-bg::before {
    content: "";
    position: absolute; inset: 0;
    z-index: 4; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  }

  .hue-shifter {
    position: absolute; inset: 0; z-index: 1;
    animation: hueShiftLoop 40s infinite linear;
    will-change: filter;
  }

  .glow-orb {
    position: absolute;
    border-radius: 50%;
    opacity: 0.55;
    will-change: transform;
    animation: ultraSmoothFloat 25s infinite alternate ease-in-out;
  }

  .orb-1 {
    width: 85vw; height: 85vw;
    background: radial-gradient(circle, rgba(0, 110, 255, 0.16) 0%, rgba(0, 229, 255, 0.06) 35%, rgba(0,0,0,0) 70%);
    top: -10%; left: -15%;
  }

  .orb-2 {
    width: 90vw; height: 90vw;
    background: radial-gradient(circle, rgba(0, 229, 255, 0.12) 0%, rgba(138, 43, 226, 0.04) 40%, rgba(0,0,0,0) 70%);
    bottom: -15%; right: -15%;
    animation-duration: 30s;
    animation-delay: -5s;
  }
  
  .orb-3 {
    width: 75vw; height: 75vw;
    background: radial-gradient(circle, rgba(138, 43, 226, 0.1) 0%, rgba(0,0,0,0) 65%);
    top: 35%; left: 10%;
    animation-duration: 28s;
    animation-delay: -8s;
  }

  /* ===== HIGH-PERFORMANCE SPARKS ===== */
  .sparks-wrapper {
    position: absolute; inset: 0; z-index: 2; overflow: hidden;
  }

  .spark {
    position: absolute;
    bottom: -20px;
    border-radius: 50%;
    will-change: transform, opacity;
    animation: sparkRise 7s infinite linear;
  }

  .spark-1  { width: 4px; height: 4px; left: 10%; background: radial-gradient(circle, #fff 20%, #00e5ff 80%); animation-duration: 6s;  animation-delay: 0s; }
  .spark-2  { width: 3px; height: 3px; left: 25%; background: radial-gradient(circle, #fff 30%, rgba(0,229,255,0.6) 90%); animation-duration: 8s;  animation-delay: 1.5s; }
  .spark-3  { width: 5px; height: 5px; left: 45%; background: radial-gradient(circle, #fff 10%, #00e5ff 80%); animation-duration: 5.5s; animation-delay: 3s; }
  .spark-4  { width: 3px; height: 3px; left: 65%; background: radial-gradient(circle, #fff 30%, rgba(0,229,255,0.6) 90%); animation-duration: 9s;  animation-delay: 0.5s; }
  .spark-5  { width: 4px; height: 4px; left: 80%; background: radial-gradient(circle, #fff 20%, #00e5ff 80%); animation-duration: 7s;  animation-delay: 4.5s; }
  .spark-6  { width: 3px; height: 3px; left: 92%; background: radial-gradient(circle, #fff 20%, #ffffff 80%); animation-duration: 8.5s; animation-delay: 2s; }
  .spark-7  { width: 5px; height: 5px; left: 18%; background: radial-gradient(circle, #fff 20%, #00e5ff 80%); animation-duration: 6.5s; animation-delay: 5s; }
  .spark-8  { width: 4px; height: 4px; left: 70%; background: radial-gradient(circle, #fff 20%, #ffffff 80%); animation-duration: 7.5s; animation-delay: 3.5s; }

  @keyframes sparkRise {
    0% { transform: translate3d(0, 0, 0) scale(0.6); opacity: 0; }
    12% { opacity: 0.85; }
    50% { transform: translate3d(15px, -45vh, 0) scale(1); opacity: 0.85; }
    75% { transform: translate3d(-15px, -75vh, 0) scale(0.8); opacity: 0.4; }
    100% { transform: translate3d(10px, -105vh, 0) scale(0.4); opacity: 0; }
  }

  @keyframes ultraSmoothFloat {
    0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
    50% { transform: translate3d(5%, 6%, 0) scale(1.08) rotate(180deg); }
    100% { transform: translate3d(-3%, -4%, 0) scale(0.97) rotate(360deg); }
  }

  @keyframes hueShiftLoop {
    from { filter: hue-rotate(0deg); }
    to { filter: hue-rotate(360deg); }
  }

  /* ===== LOGIN SCREEN ===== */
  .login-screen {
    position: fixed; inset: 0; z-index: 300;
    max-width: 430px; margin: 0 auto;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px 32px; gap: 22px;
  }
  @media (orientation: landscape) { .login-screen { max-width: 100%; } }
  .login-screen .logo {
    font-size: 34px; margin-bottom: 4px;
  }
  .login-screen .tagline {
    color: var(--muted); font-size: 14px; line-height: 1.7; max-width: 280px;
  }
  .btn-primary {
    background: var(--blue); color: #001318; border: none;
    padding: 14px 36px; border-radius: 30px;
    font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer; box-shadow: 0 0 25px var(--blue-glow);
    transition: transform 0.2s ease;
  }
  .btn-primary:active { transform: scale(0.96); }
  .login-status { font-size: 13px; color: var(--muted); min-height: 18px; }
</style>
</head>

    <div class="sparks-wrapper">

        <div class="spark spark-2"></div>
        <div class="spark spark-3"></div>
        <div class="spark spark-4"></div>
        <div class="spark spark-5"></div>

</div>

<div class="login-screen" id="loginScreen">

  <div class="login-status" id="loginStatus"></div>
</div>

<div id="app" class="hidden">

</div>

    <div class="action-sheet-body" id="actionSheetBody"></div>

</div>

<div class="confirm-overlay" id="confirmOverlay" onclick="if(event.target===this) closeConfirm();">

    <div class="confirm-title" id="confirmTitle">Delete?</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-btn danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="search-overlay" id="searchOverlay">

    <button class="icon-btn" onclick="closeSearch()" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

  <div class="search-result-label hidden" id="searchResultLabel"></div>
  <div class="search-body" id="searchBody">
    <div class="state-screen" id="searchIdleState">

      <div class="title">Binge Watching Time</div>
      <div class="msg">Typing the name of a movie or show.</div>

  </div>
</div>

<div class="bottom-nav">
