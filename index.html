<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-FLIX Admin Panel</title>
<style>
  :root {
    --bg: #050508;
    --panel: #0c0c12;
    --card: #12121a;
    --border: rgba(255,255,255,0.08);
    --blue: #00e5ff;
    --blue-glow: rgba(0, 229, 255, 0.25);
    --muted: #8a8a96;
    --danger: #ff4d4d;
    --good: #3ddc84;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% -10%, #0d1520 0%, var(--bg) 55%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .hidden { display: none !important; }

  /* ---------- Shared UI Elements ---------- */
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
    background: linear-gradient(145deg, var(--blue), #0077a3);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px; color: #001217;
  }
  .brand-text { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; white-space: nowrap; }
  .brand-text span { color: var(--muted); font-weight: 500; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: none; border-radius: 10px; padding: 11px 18px;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: filter 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--blue); color: #001217; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: #fff; }
  .btn-ghost:hover { filter: brightness(1.2); }
  .btn-danger { background: rgba(255,77,77,0.12); color: var(--danger); }
  .btn-danger:hover { filter: brightness(1.15); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .field input, .field textarea {
    width: 100%; background: #0a0a10; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 14px; outline: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--blue); }

  /* ---------- Login Screen ---------- */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card {
    width: 100%; max-width: 360px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 18px; padding: 32px 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .login-card .brand { margin-bottom: 28px; }
  .login-error {
    background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); color: #ff8a8a;
    font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; display: none;
  }
  .login-error.show { display: block; }
  .login-hint { font-size: 12px; color: var(--muted); margin-top: 18px; line-height: 1.5; }

  /* ---------- Topbar & Navigation ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 20px; background: rgba(5,5,8,0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .tabs { display: flex; gap: 6px; background: rgba(255,255,255,0.04); padding: 4px; border-radius: 10px; }
  .tab-btn {
    border: none; background: none; color: var(--muted); font-size: 12px; font-weight: 700;
    padding: 8px 14px; border-radius: 8px; cursor: pointer;
  }
  .tab-btn.active { background: var(--blue); color: #001217; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 22px 20px 60px; }

  /* ---------- Drive Connect ---------- */
  .connect-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px 28px; text-align: center; max-width: 440px; margin: 40px auto;
  }
  .connect-card .e { font-size: 36px; margin-bottom: 14px; }
  .connect-card .t { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .connect-card .m { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }

  /* ---------- Drive File Manager ---------- */
  .breadcrumb-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .breadcrumb { font-size: 13px; color: var(--muted); display: flex; align-items: center; flex-wrap: wrap; gap: 2px; }
  .breadcrumb .crumb { cursor: pointer; padding: 4px 6px; border-radius: 6px; }
  .breadcrumb .crumb:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .breadcrumb .crumb:last-child { color: #fff; font-weight: 700; cursor: default; }

  .fm-grid, .poster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 14px; }
  .fm-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; display: flex; flex-direction: column; position: relative;
  }
  .fm-thumb {
    width: 100%; aspect-ratio: 2/3; background: #0a0a10; overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .fm-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .fm-thumb .ph { font-size: 30px; color: var(--muted); }
  .fm-info { padding: 9px 10px 10px; }
  .fm-name {
    font-size: 12px; font-weight: 600; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 8px; min-height: 32px;
  }
  .fm-actions { display: flex; gap: 6px; }
  .fm-actions button {
    flex: 1; background: rgba(255,255,255,0.06); border: none; color: #fff;
    border-radius: 7px; padding: 7px 0; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .fm-actions .poster-btn { background: rgba(0,229,255,0.12); color: var(--blue); }

  /* ---------- Push Notification Section ---------- */
  .push-container { display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; }
  .glass-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.37);
  }
  .card-title {
    font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--blue); margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
  }
  .poster-sources { display: flex; gap: 10px; margin-bottom: 14px; }
  .source-btn {
    background: #0a0a10; border: 1px solid var(--border); color: var(--muted);
    padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .source-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(0, 229, 255, 0.1); }

  .poster-preview-pill {
    display: flex; align-items: center; gap: 12px; background: #0a0a10;
    border: 1px solid var(--blue); padding: 10px 14px; border-radius: 12px; margin-top: 10px;
  }
  .poster-preview-pill img { width: 40px; height: 55px; border-radius: 6px; object-fit: cover; }
  .poster-preview-pill .p-title { font-size: 13px; font-weight: 700; }

  /* ---------- TMDB Results Grid ---------- */
  .tmdb-results-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px;
    max-height: 340px; overflow-y: auto; padding-right: 2px; margin-top: 10px;
  }
  .tmdb-result-card { cursor: pointer; border-radius: 10px; overflow: hidden; background: var(--card); border: 1px solid var(--border); }
  .tmdb-result-card:hover { border-color: var(--blue); }
  .tmdb-result-thumb { width: 100%; aspect-ratio: 2/3; background: #0a0a10; }
  .tmdb-result-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tmdb-result-label { font-size: 10.5px; padding: 5px 6px 6px; line-height: 1.3; }
  .tmdb-type-tag { display: inline-block; margin-top: 3px; font-size: 9px; font-weight: 700; background: rgba(0,229,255,0.12); color: var(--blue); padding: 1px 5px; border-radius: 5px; }

  /* ---------- History List ---------- */
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .history-card { display: flex; align-items: center; gap: 14px; background: #0a0a10; padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
  .history-card img { width: 42px; height: 60px; border-radius: 6px; object-fit: cover; }
  .history-details { flex: 1; }
  .history-details h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .history-details p { font-size: 12px; color: var(--muted); }

  /* ---------- Modals & Toasts ---------- */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.65); padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box { width: 100%; max-width: 380px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-height: 90vh; overflow-y: auto; }
  .preview-box { width: 140px; aspect-ratio: 2/3; background: #0a0a10; border: 1px dashed var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0 auto 18px; }
  .preview-box img { width: 100%; height: 100%; object-fit: cover; }

  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: #12121a; border: 1px solid var(--border); color: #fff;
    padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.good { border-color: rgba(61,220,132,0.4); }
  .toast.bad { border-color: rgba(255,77,77,0.4); }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">D</div>
      <div class="brand-text">D-FLIX <span>Admin</span></div>
    </div>
    <div class="login-error" id="loginError"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%;">Login</button>
  </div>
</div>

<!-- Admin Main Dashboard Shell -->
<div id="adminWrap" class="hidden">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">D</div>
      <div class="brand-text">D-FLIX <span>Admin Panel</span></div>
    </div>
    <div class="tabs" id="tabsRow">
      <button class="tab-btn active" data-tab="browse">📁 Browse Drive</button>
      <button class="tab-btn" data-tab="manage">🖼️ All Posters</button>
      <button class="tab-btn" data-tab="push">🚀 Push Notification</button>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-ghost hidden" id="disconnectDriveBtn">Disconnect Drive</button>
      <button class="btn btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="wrap">
    
    <!-- TAB 1: BROWSE DRIVE -->
    <div id="tabBrowse">
      <div id="driveConnectState" class="connect-card">
        <div class="e">🔗</div>
        <div class="t">Google Drive Connect Karein</div>
        <div class="m">Apne Google Drive folder se poster direct select karne ke liye connect karein.</div>
        <button class="btn btn-primary" id="connectDriveBtn">Connect Google Drive</button>
      </div>

      <div id="driveBrowseState" class="hidden">
        <div class="breadcrumb-row">
          <div class="breadcrumb" id="breadcrumb"></div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-ghost" id="selectModeBtn">☑️ Select Multiple</button>
          </div>
        </div>
        <div id="driveBrowseGrid"></div>
      </div>
    </div>

    <!-- TAB 2: MANAGE POSTERS -->
    <div id="tabManage" class="hidden">
      <div class="field">
        <input type="text" id="searchInput" placeholder="Search posters by title...">
      </div>
      <div id="posterListWrap"></div>
    </div>

    <!-- TAB 3: PUSH NOTIFICATION PORTAL -->
    <div id="tabPush" class="hidden">
      <div class="push-container">
        
        <div class="glass-card">
          <div class="card-title">🚀 Broadcast New Notification</div>
          
          <div class="field">
            <label>Attach Poster (Select Source)</label>
            <div class="poster-sources">
              <button class="source-btn active" id="btnPushModeTmdb" onclick="setPushPosterMode('tmdb')">🎬 Smart TMDB Search</button>
              <button class="source-btn" id="btnPushModeImdb" onclick="setPushPosterMode('imdb')">💛 IMDb Search</button>
              <button class="source-btn" id="btnPushModeUrl" onclick="setPushPosterMode('url')">🔗 Image Link</button>
            </div>

            <!-- Mode 1: Smart TMDB (Matching Upper Engine) -->
            <div id="pushTmdbContainer">
              <input type="text" id="pushTmdbInput" placeholder="Enter movie/TV name or file string (e.g. Pathaan.2023.1080p.mkv)...">
              <div id="pushTmdbResults" class="tmdb-results-grid"></div>
            </div>

            <!-- Mode 2: IMDb Search -->
            <div id="pushImdbContainer" style="display:none;">
              <input type="text" id="pushImdbInput" placeholder="Search IMDb...">
              <div id="pushImdbResults" class="tmdb-results-grid"></div>
            </div>

            <!-- Mode 3: Direct Link -->
            <div id="pushUrlContainer" style="display:none;">
              <input type="text" id="pushDirectUrlInput" placeholder="Paste image URL https://...">
              <button class="btn btn-ghost" id="btnPushAttachUrl" style="margin-top:8px;">Attach Link</button>
            </div>

            <!-- Selected Poster Preview Pill -->
            <div id="pushSelectedPosterBox" class="poster-preview-pill" style="display:none;">
              <img id="pushSelectedPosterImg" src="">
              <div style="flex:1;">
                <div class="p-title" id="pushSelectedPosterTitle"></div>
              </div>
              <button class="btn btn-danger" style="padding:4px 8px;" id="btnRemovePushPoster">Remove</button>
            </div>
          </div>

          <div class="field">
            <label>Notification Title</label>
            <input type="text" id="pushTitleInput" placeholder="Enter title...">
          </div>

          <div class="field">
            <label>Message Content</label>
            <textarea id="pushBodyInput" rows="3" placeholder="Enter message body..."></textarea>
          </div>

          <button class="btn btn-primary" id="btnSendNotification" style="width:100%;">Dispatch Notification</button>
        </div>

        <div class="glass-card">
          <div class="card-title">🕒 Sent History</div>
          <div id="notificationHistoryList" class="history-list"></div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- Poster Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle" style="font-weight:700; margin-bottom:14px;">Set Poster</div>
    <div id="modalFormFields">
      <div class="preview-box" id="previewBox">No image</div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="posterName">
      </div>
      <div class="field">
        <button class="btn btn-ghost" id="autoFetchBtn" style="width:100%;">🔍 Smart Auto-fetch TMDB</button>
      </div>
      <div class="field">
        <label>Poster Image URL</label>
        <input type="text" id="posterUrl">
      </div>
    </div>

    <div id="tmdbResultsPanel" class="hidden">
      <div id="tmdbResultsGrid" class="tmdb-results-grid"></div>
      <button class="btn btn-ghost" id="tmdbResultsBackBtn" style="width:100%; margin-top:14px;">← Back</button>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="btn btn-ghost" id="modalCancelBtn" style="flex:1;">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn" style="flex:1;">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase Compat Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
  // ============================================================
  // CONFIGURATION
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyATfDfJNk0lPVpcsZk7yj2p_DSdK9sQXvo",
    authDomain: "dflix-7b2d2.firebaseapp.com",
    databaseURL: "https://dflix-7b2d2-default-rtdb.firebaseio.com",
    projectId: "dflix-7b2d2",
    storageBucket: "dflix-7b2d2.firebasestorage.app",
    messagingSenderId: "410654152125",
    appId: "1:410654152125:web:c55db9c81363abce66eed4"
  };

  const GOOGLE_CLIENT_ID = "410654152125-cp96b2j3micih6bak84n14sa24rard24.apps.googleusercontent.com";
  const LOCKED_ROOT_FOLDER_ID = "17s88x00QQXAnTQtFWasBIOcgRqziTEnQ";
  const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.readonly";

  const TMDB_API_KEY = "16b0f944d64a43298cf3ce5fc5852ffb";
  const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w342";
  
  const TMDB_JUNK_TOKENS = [
    "1080p", "720p", "480p", "2160p", "4k", "8k", "hdcam", "hdrip", "dvdrip",
    "webrip", "web dl", "webdl", "bluray", "blu ray", "brrip", "bdrip",
    "hdtv", "x264", "x265", "hevc", "h264", "h265", "aac", "ac3", "dts",
    "esubs", "esub", "subbed", "dual audio", "multi audio", "dubbed",
    "hindi", "english", "tamil", "telugu", "kannada", "malayalam", "korean",
    "proper", "extended", "uncut", "remastered", "nf", "amzn", "hmax",
    "yify", "yts", "rarbg", "galaxytv", "psa", "org"
  ];

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // ============================================================
  // SMART TMDB PARSER ENGINE (Shared across Posters & Push)
  // ============================================================
  function tmdbParseFilename(rawName) {
    var name = (rawName || "").replace(/\.(mkv|mp4|avi|mov|wmv|flv|webm|m4v|ts|3gp)$/i, "");
    var year = null;
    var yearMatch = name.match(/\b(19\d{2}|20\d{2})\b/);
    if (yearMatch) year = yearMatch[1];

    var guessedType = "movie";
    var titleSource;
    var seMatch = name.match(/\bS\d{1,2}\s?E\d{1,3}\b/i);
    var seasonMatch = name.match(/\bSeason\s?\d{1,2}\b/i);
    if (seMatch) {
      guessedType = "tv";
      titleSource = name.substring(0, seMatch.index);
    } else if (seasonMatch) {
      guessedType = "tv";
      titleSource = name.substring(0, seasonMatch.index);
    } else {
      titleSource = name;
    }

    titleSource = titleSource.replace(/[\[\(\{][^\[\]\(\)\{\}]*[\]\)\}]/g, " ");
    titleSource = titleSource.replace(/[._-]/g, " ");

    TMDB_JUNK_TOKENS.forEach(function (tok) {
      var re = new RegExp("\\b" + tok.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "gi");
      titleSource = titleSource.replace(re, " ");
    });

    titleSource = titleSource.replace(/\b(19\d{2}|20\d{2})\b/g, " ");
    titleSource = titleSource.replace(/\b\d+(\.\d+)?\s?(MB|GB|KB)\b/gi, " ");
    titleSource = titleSource.replace(/\s+/g, " ").trim();

    return { title: titleSource, year: year, guessedType: guessedType };
  }

  function tmdbSearchAll(title, year, callback) {
    var movieUrl = "https://api.themoviedb.org/3/search/movie?api_key=" + TMDB_API_KEY
      + "&query=" + encodeURIComponent(title) + (year ? "&year=" + year : "");
    var tvUrl = "https://api.themoviedb.org/3/search/tv?api_key=" + TMDB_API_KEY + "&query=" + encodeURIComponent(title);

    Promise.all([
      fetch(movieUrl).then(r => r.json()).catch(() => ({ results: [] })),
      fetch(tvUrl).then(r => r.json()).catch(() => ({ results: [] }))
    ]).then(function (resArr) {
      var movieResults = (resArr[0].results || []).slice(0, 8).map(m => ({
        type: "movie",
        title: m.title,
        year: m.release_date ? m.release_date.substring(0, 4) : null,
        posterUrl: m.poster_path ? TMDB_IMAGE_BASE + m.poster_path : null
      }));
      var tvResults = (resArr[1].results || []).slice(0, 8).map(t => ({
        type: "tv",
        title: t.name,
        year: t.first_air_date ? t.first_air_date.substring(0, 4) : null,
        posterUrl: t.poster_path ? TMDB_IMAGE_BASE + t.poster_path : null
      }));
      var combined = movieResults.concat(tvResults).filter(r => r.posterUrl);
      callback(combined);
    }).catch(() => callback([]));
  }

  // ============================================================
  // AUTH & TAB NAVIGATION
  // ============================================================
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("loginWrap").classList.add("hidden");
      document.getElementById("adminWrap").classList.remove("hidden");
      attachPosterListener();
      loadNotificationHistory();
    } else {
      document.getElementById("adminWrap").classList.add("hidden");
      document.getElementById("loginWrap").classList.remove("hidden");
    }
  });

  document.getElementById("loginBtn").addEventListener("click", () => {
    auth.signInWithEmailAndPassword(
      document.getElementById("loginEmail").value.trim(),
      document.getElementById("loginPassword").value
    ).catch(err => {
      document.getElementById("loginError").textContent = err.message;
      document.getElementById("loginError").classList.add("show");
    });
  });

  document.getElementById("logoutBtn").addEventListener("click", () => auth.signOut());

  document.querySelectorAll("#tabsRow .tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#tabsRow .tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const tab = btn.getAttribute("data-tab");
      document.getElementById("tabBrowse").classList.toggle("hidden", tab !== "browse");
      document.getElementById("tabManage").classList.toggle("hidden", tab !== "manage");
      document.getElementById("tabPush").classList.toggle("hidden", tab !== "push");
    });
  });

  // ============================================================
  // PUSH NOTIFICATION SYSTEM (ENHANCED WITH SMART TMDB)
  // ============================================================
  var pushSelectedPoster = null;
  var pushSearchTimer = null;

  function setPushPosterMode(mode) {
    document.getElementById("btnPushModeTmdb").classList.toggle("active", mode === 'tmdb');
    document.getElementById("btnPushModeImdb").classList.toggle("active", mode === 'imdb');
    document.getElementById("btnPushModeUrl").classList.toggle("active", mode === 'url');

    document.getElementById("pushTmdbContainer").style.display = mode === 'tmdb' ? 'block' : 'none';
    document.getElementById("pushImdbContainer").style.display = mode === 'imdb' ? 'block' : 'none';
    document.getElementById("pushUrlContainer").style.display = mode === 'url' ? 'block' : 'none';
  }

  // Smart TMDB Search for Push Notification
  document.getElementById("pushTmdbInput").addEventListener("input", function() {
    var raw = this.value.trim();
    clearTimeout(pushSearchTimer);
    if (!raw) { document.getElementById("pushTmdbResults").innerHTML = ""; return; }

    pushSearchTimer = setTimeout(() => {
      var parsed = tmdbParseFilename(raw);
      document.getElementById("pushTmdbResults").innerHTML = '<div style="font-size:12px; color:var(--muted)">Searching...</div>';
      tmdbSearchAll(parsed.title, parsed.year, results => {
        renderPushTmdbResults(results);
      });
    }, 300);
  });

  function renderPushTmdbResults(results) {
    var grid = document.getElementById("pushTmdbResults");
    if (!results || results.length === 0) {
      grid.innerHTML = '<div style="font-size:12px; color:var(--muted)">No poster results found</div>';
      return;
    }
    var html = "";
    results.forEach((r, idx) => {
      html += '<div class="tmdb-result-card" onclick="selectPushPoster(\'' + r.posterUrl + '\', \'' + r.title.replace(/'/g, "\\'") + '\')">'
        + '<div class="tmdb-result-thumb"><img src="' + r.posterUrl + '"></div>'
        + '<div class="tmdb-result-label">' + r.title + '<br><span class="tmdb-type-tag">' + r.type.toUpperCase() + '</span></div>'
        + '</div>';
    });
    grid.innerHTML = html;
  }

  // IMDb Auto Search fallback
  document.getElementById("pushImdbInput").addEventListener("input", function() {
    var q = this.value.trim();
    clearTimeout(pushSearchTimer);
    if (q.length < 2) return;
    pushSearchTimer = setTimeout(() => {
      fetch("https://v3.sg.media-imdb.com/suggestion/x/a/" + encodeURIComponent(q) + ".json")
        .then(r => r.json()).then(data => {
          var items = (data.d || []).filter(i => i.i && i.i.imageUrl);
          var html = "";
          items.forEach(i => {
            html += '<div class="tmdb-result-card" onclick="selectPushPoster(\'' + i.i.imageUrl + '\', \'' + i.l.replace(/'/g, "\\'") + '\')">'
              + '<div class="tmdb-result-thumb"><img src="' + i.i.imageUrl + '"></div>'
              + '<div class="tmdb-result-label">' + i.l + '</div></div>';
          });
          document.getElementById("pushImdbResults").innerHTML = html;
        });
    }, 300);
  });

  document.getElementById("btnPushAttachUrl").addEventListener("click", () => {
    var url = document.getElementById("pushDirectUrlInput").value.trim();
    if (url) selectPushPoster(url, "Custom Image Link");
  });

  function selectPushPoster(url, title) {
    pushSelectedPoster = { url: url, title: title };
    document.getElementById("pushSelectedPosterImg").src = url;
    document.getElementById("pushSelectedPosterTitle").textContent = title;
    document.getElementById("pushSelectedPosterBox").style.display = "flex";
    if (!document.getElementById("pushTitleInput").value && title !== "Custom Image Link") {
      document.getElementById("pushTitleInput").value = title;
    }
  }

  document.getElementById("btnRemovePushPoster").addEventListener("click", () => {
    pushSelectedPoster = null;
    document.getElementById("pushSelectedPosterBox").style.display = "none";
  });

  document.getElementById("btnSendNotification").addEventListener("click", function() {
    var title = document.getElementById("pushTitleInput").value.trim();
    var body = document.getElementById("pushBodyInput").value.trim();
    if (!title && !body) { showToast("Enter title or body", false); return; }

    var payload = { title: title, body: body, ts: Date.now() };
    if (pushSelectedPoster) payload.poster = pushSelectedPoster.url;

    db.ref("notifications").push(payload).then(() => {
      showToast("Notification sent successfully!", true);
      document.getElementById("pushTitleInput").value = "";
      document.getElementById("pushBodyInput").value = "";
      pushSelectedPoster = null;
      document.getElementById("pushSelectedPosterBox").style.display = "none";
      loadNotificationHistory();
    }).catch(err => showToast("Fail: " + err.message, false));
  });

  function loadNotificationHistory() {
    db.ref("notifications").limitToLast(15).once("value", snap => {
      var data = snap.val() || {};
      var list = Object.keys(data).map(k => ({ id: k, ...data[k] })).sort((a,b) => b.ts - a.ts);
      var html = "";
      list.forEach(item => {
        html += '<div class="history-card">'
          + (item.poster ? '<img src="' + item.poster + '">' : '<div style="width:42px;height:60px;background:#12121a;"></div>')
          + '<div class="history-details"><h4>' + (item.title || "No Title") + '</h4><p>' + (item.body || "") + '</p></div>'
          + '<button class="btn btn-danger" style="padding:4px 8px;font-size:11px;" onclick="deleteNotification(\'' + item.id + '\')">Delete</button>'
          + '</div>';
      });
      document.getElementById("notificationHistoryList").innerHTML = html || '<div style="color:var(--muted);font-size:12px;">No notifications sent yet.</div>';
    });
  }

  function deleteNotification(id) {
    db.ref("notifications/" + id).remove().then(() => loadNotificationHistory());
  }

  // ============================================================
  // POSTERS & DRIVE MANAGEMENT
  // ============================================================
  var allPosters = {};
  function posterKeyEncode(name) {
    return (name || "").trim().toLowerCase().replace(/\s+/g, " ").replace(/[.#$\[\]\/]/g, ch => "_" + ch.charCodeAt(0) + "_");
  }

  function attachPosterListener() {
    db.ref("posters").on("value", snap => {
      allPosters = snap.val() || {};
      renderPosterList();
    });
  }

  function renderPosterList() {
    var query = document.getElementById("searchInput").value.trim().toLowerCase();
    var keys = Object.keys(allPosters).filter(k => (allPosters[k].name || "").toLowerCase().includes(query));
    var html = '<div class="poster-grid">';
    keys.forEach(k => {
      var entry = allPosters[k];
      html += '<div class="fm-card"><div class="fm-thumb"><img src="' + entry.url + '"></div>'
        + '<div class="fm-info"><div class="fm-name">' + entry.name + '</div></div></div>';
    });
    html += '</div>';
    document.getElementById("posterListWrap").innerHTML = html;
  }

  // ============================================================
  // DRIVE OAUTH DISPATCH
  // ============================================================
  var driveAccessToken = null;
  var tokenClient = null;

  window.addEventListener("load", () => {
    var checkGoogle = setInterval(() => {
      if (window.google && google.accounts && google.accounts.oauth2) {
        clearInterval(checkGoogle);
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: DRIVE_SCOPE,
          callback: (resp) => {
            if (!resp.error) {
              driveAccessToken = resp.access_token;
              document.getElementById("driveConnectState").classList.add("hidden");
              document.getElementById("driveBrowseState").classList.remove("hidden");
              loadDriveFolder(LOCKED_ROOT_FOLDER_ID);
            }
          }
        });
      }
    }, 300);
  });

  document.getElementById("connectDriveBtn").addEventListener("click", () => tokenClient && tokenClient.requestAccessToken());

  function loadDriveFolder(folderId) {
    fetch("https://www.googleapis.com/drive/v3/files?q='" + folderId + "'+in+parents+and+trashed=false&fields=files(id,name,mimeType)", {
      headers: { Authorization: "Bearer " + driveAccessToken }
    }).then(r => r.json()).then(data => {
      var files = data.files || [];
      var html = '<div class="fm-grid">';
      files.forEach(f => {
        var isFolder = f.mimeType === "application/vnd.google-apps.folder";
        html += '<div class="fm-card"><div class="fm-thumb" onclick="' + (isFolder ? "loadDriveFolder('" + f.id + "')" : "openModalForDrive('" + f.name.replace(/'/g, "\\'") + "')") + '"><div class="ph">' + (isFolder ? "📁" : "🎬") + '</div></div>'
          + '<div class="fm-info"><div class="fm-name">' + f.name + '</div></div></div>';
      });
      html += '</div>';
      document.getElementById("driveBrowseGrid").innerHTML = html;
    });
  }

  // ============================================================
  // MODAL HANDLERS
  // ============================================================
  function openModalForDrive(name) {
    document.getElementById("posterName").value = name;
    document.getElementById("modalOverlay").classList.add("active");
  }
  document.getElementById("modalCancelBtn").addEventListener("click", () => document.getElementById("modalOverlay").classList.remove("active"));

  document.getElementById("modalSaveBtn").addEventListener("click", () => {
    var name = document.getElementById("posterName").value.trim();
    var url = document.getElementById("posterUrl").value.trim();
    if (!name || !url) return;
    db.ref("posters/" + posterKeyEncode(name)).set({ name: name, url: url, updatedAt: Date.now() }).then(() => {
      showToast("Poster saved!", true);
      document.getElementById("modalOverlay").classList.remove("active");
    });
  });

  function showToast(msg, good) {
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast show " + (good ? "good" : "bad");
    setTimeout(() => el.classList.remove("show"), 3000);
  }
</script>
</body>
</html>
